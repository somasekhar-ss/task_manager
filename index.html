<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Task Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-5">

    <h1 class="text-center mb-4">Focus Task Manager</h1>

    <div class="card p-4 shadow-lg task-card">

        <div class="row g-2 mb-3">

            <div class="col-md-6">
                <input
                    type="text"
                    id="taskInput"
                    class="form-control"
                    placeholder="Enter task">
            </div>

            <div class="col-md-3">
                <input
                    type="number"
                    id="timeInput"
                    class="form-control"
                    placeholder="Minutes">
            </div>

            <div class="col-md-3 d-grid">
                <button
                    class="btn btn-primary"
                    onclick="addTask()">
                    Add Task
                </button>
            </div>

        </div>

        <ul id="taskList" class="list-group"></ul>

    </div>

</div>

<!-- Focus Mode -->
<div id="focusMode" class="focus-mode d-none">

    <h1 id="focusTaskName"></h1>

    <div id="timerDisplay">00:00</div>

    <button class="btn btn-success mt-4" onclick="closeFocusMode()">
        Exit Focus Mode
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
